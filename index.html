<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopee</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background-color: #E74B2E;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  font-family: Arial;
  gap: 20px;
}

/* PLAYER */
.audio-msg {
  width: 90%;
  max-width: 400px;
  background: #ffffff;
  border-radius: 12px 12px 12px 4px;
  padding: 10px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.play-btn {
  width: 32px;
  height: 32px;
  background: #E74B2E;
  color: white;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

/* BOTÕES */
.botao {
  border-radius: 12px;
  text-decoration: none;
  font-weight: bold;
  text-align: center;
}

.botao-cupom {
  background: black;
  color: white;
  font-size: 18px;
  width: 90%;
  max-width: 400px;
  height: 80px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.botao-shopee {
  background: white;
  color: #E74B2E;
  font-size: 22px;
  width: 260px;
  height: 70px;
  display: flex;
  align-items: center;
  justify-content: center;
}
</style>

</head>

<body>

<div class="audio-msg">
  <div class="play-btn" id="playBtn">▶</div>
</div>

<audio id="audioReal" src="audio.mp3"></audio>

<a href="#" id="btnCupom" class="botao botao-cupom">
Clique aqui e copie o cupom
</a>

<a href="#" id="btnShopee" class="botao botao-shopee">
Abrir a Shopee
</a>

<script>
(function(){

const LINK_SHOPEE = "https://s.shopee.com.br/4qBaEnyoyr";
const API_URL = "https://shopee-utm-tracker.onrender.com";
const UC_BASE = "N33T01";
const CUPOM = "LOJARASANT507AF";

/* FLAGS */
let p25=false, p50=false, p75=false, p100=false;
let tempoAtual = 0;
let tempoLabel = "";
let playerClick = false;

/* PLAYER */
const audio = document.getElementById("audioReal");
const playBtn = document.getElementById("playBtn");

playBtn.addEventListener("click", () => {

  playerClick = true;
  fbq('trackCustom', 'PlayerClick');

  if (audio.paused) {
    audio.play();
    playBtn.innerText = "❚❚";
  } else {
    audio.pause();
    playBtn.innerText = "▶";
  }
});

/* PROGRESSO AUDIO */
audio.addEventListener("timeupdate", () => {

  if (!audio.duration) return;

  let p = audio.currentTime / audio.duration;

  if (p >= 0.25 && !p25) { p25=true; fbq('trackCustom','Audio25'); }
  if (p >= 0.50 && !p50) { p50=true; fbq('trackCustom','Audio50'); }
  if (p >= 0.75 && !p75) { p75=true; fbq('trackCustom','Audio75'); }
  if (p >= 0.99 && !p100){ p100=true; fbq('trackCustom','Audio100'); }

});

/* TEMPO 2 EM 2 */
setInterval(() => {

  tempoAtual += 2;

  if (tempoAtual <= 30) {
    let ini = tempoAtual - 2;
    let fim = tempoAtual;
    tempoLabel = "S" + ini + "a" + fim;
    fbq('trackCustom', 'Tempo_' + tempoLabel);
  } else {
    tempoLabel = "S30";
    fbq('trackCustom', 'Tempo_30+');
  }

}, 2000);

/* UC */
function limparUC(str){
  return str.replace(/[^a-zA-Z0-9]/g, "");
}

function extras(){
  let e = "";

  if (playerClick) e += "PL";
  if (p25) e += "P25";
  if (p50) e += "P50";
  if (p75) e += "P75";
  if (p100) e += "P100";
  if (tempoLabel) e += tempoLabel;

  return e;
}

/* FLUXO */
function executarFluxo(e, element, tipo){

  const rect = element.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const w = rect.width;

  let pos = x < w*0.3 ? "Left" : x > w*0.7 ? "Right" : "Center";

  let id = UC_BASE;

  if (tipo === "cupom") {
    id += "CupomClick" + pos;
    fbq('trackCustom','CupomClick_'+pos);
    fbq('track','InitiateCheckout');
  } else {
    id += "ClickShopee" + pos;
    fbq('trackCustom','ClickShopee_'+pos);
    fbq('track','ViewContent');
  }

  id += extras();
  id = limparUC(id);

  const link = encodeURIComponent(LINK_SHOPEE);
  const finalURL = `${API_URL}/?link=${link}&uc=${id}`;

  setTimeout(()=>{ window.location.href = finalURL; },150);
}

/* BOTÕES */
document.getElementById("btnShopee").onclick = function(e){
  e.preventDefault();
  this.innerText = "Redirecionando...";
  executarFluxo(e,this,"normal");
};

document.getElementById("btnCupom").onclick = function(e){
  e.preventDefault();
  navigator.clipboard.writeText(CUPOM);
  this.innerText = "Copiado!";
  executarFluxo(e,this,"cupom");
};

})();
</script>

</body>
</html>
