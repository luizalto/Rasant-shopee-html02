<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopee</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background-color: #E74B2E;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  font-family: Arial;
  gap: 20px;
}

.audio-msg {
  width: 90%;
  max-width: 400px;
  background: #ffffff;
  border-radius: 12px 12px 12px 4px;
  padding: 10px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.play-btn {
  width: 32px;
  height: 32px;
  background: #E74B2E;
  color: white;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

.botao {
  border-radius: 12px;
  text-decoration: none;
  font-weight: bold;
  text-align: center;
}

.botao-cupom {
  background: black;
  color: white;
  width: 90%;
  max-width: 400px;
  height: 80px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.botao-shopee {
  background: white;
  color: #E74B2E;
  width: 260px;
  height: 70px;
  display: flex;
  align-items: center;
  justify-content: center;
}
</style>

</head>

<body>

<div class="audio-msg">
  <div class="play-btn" id="playBtn">▶</div>
</div>

<audio id="audioReal" src="audio.mp3"></audio>

<a href="#" id="btnCupom" class="botao botao-cupom">
Clique aqui e copie o cupom
</a>

<a href="#" id="btnShopee" class="botao botao-shopee">
Abrir Shopee
</a>

<script>
(function(){

const LINK_SHOPEE = "https://s.shopee.com.br/4qBaEnyoyr";
const API_URL = "https://shopee-utm-tracker.onrender.com";
const UC_BASE = "N33T01";
const CUPOM = "LOJARASANT507AF";

let audio50 = false;
let audio100 = false;
let playerClick = false;
let tempoAtual = 0;
let tempoLabel = "";

/* PLAYER */
const audio = document.getElementById("audioReal");
const playBtn = document.getElementById("playBtn");

playBtn.addEventListener("click", () => {

  playerClick = true;
  fbq('trackCustom', 'PlayerClick');

  if (audio.paused) {
    audio.play();
    playBtn.innerText = "❚❚";
  } else {
    audio.pause();
    playBtn.innerText = "▶";
  }
});

/* AUDIO PROGRESS */
audio.addEventListener("timeupdate", () => {

  if (!audio.duration) return;

  const porcentagem = audio.currentTime / audio.duration;

  if (porcentagem >= 0.5 && !audio50) {
    audio50 = true;
    fbq('trackCustom', 'Audio50');
  }

  if (porcentagem >= 0.99 && !audio100) {
    audio100 = true;
    fbq('trackCustom', 'Audio100');
  }
});

/* TEMPO DE TELA */
setInterval(() => {

  tempoAtual += 3;

  if (tempoAtual <= 30) {
    let inicio = tempoAtual - 3;
    let fim = tempoAtual;
    tempoLabel = "S" + inicio + "a" + fim;

    fbq('trackCustom', 'Tempo_' + tempoLabel);
  } else {
    tempoLabel = "S30";
    fbq('trackCustom', 'Tempo_30+');
  }

}, 3000);

/* UC BUILDER */
function limparUC(str){
  return str.replace(/[^a-zA-Z0-9]/g, "");
}

function gerarExtras(){

  let extra = "";

  if (playerClick) extra += "PL";
  if (audio50) extra += "P50";
  if (audio100) extra += "P100";
  if (tempoLabel) extra += tempoLabel;

  return extra;
}

/* FLUXO */
function executarFluxo(e, element, tipo){

  const rect = element.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const largura = rect.width;

  let pos;

  if (x < largura * 0.3) pos = "Left";
  else if (x > largura * 0.7) pos = "Right";
  else pos = "Center";

  let identificador = UC_BASE;

  if (tipo === "cupom") {
    identificador += "CupomClick";
    fbq('trackCustom', 'CupomClick_' + pos);
    fbq('track', 'InitiateCheckout');
  } else {
    identificador += "ClickShopee";
    fbq('trackCustom', 'ClickShopee_' + pos);
    fbq('track', 'ViewContent');
  }

  identificador += pos;

  // ADICIONA EXTRAS
  identificador += gerarExtras();

  identificador = limparUC(identificador);

  const link = encodeURIComponent(LINK_SHOPEE);
  const finalURL = `${API_URL}/?link=${link}&uc=${identificador}`;

  setTimeout(() => {
    window.location.href = finalURL;
  }, 150);
}

/* BOTÕES */
document.getElementById("btnShopee").addEventListener("click", function(e){
  e.preventDefault();
  this.innerText = "Redirecionando...";
  executarFluxo(e, this, "normal");
});

document.getElementById("btnCupom").addEventListener("click", function(e){
  e.preventDefault();

  navigator.clipboard.writeText(CUPOM);
  this.innerText = "Copiado!";

  executarFluxo(e, this, "cupom");
});

})();
</script>

</body>
</html>
